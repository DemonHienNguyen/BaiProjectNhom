<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/product.css">
</head>
<body>
    <h1>Trang quản lý sản phẩm</h1>
    <span>Tên sản phẩm</span> <input type="text" name="" id="name"><br>
    <span>Ảnh sản phẩm</span> <input type="file" id="image"> <br>
    <span>Danh mục sản phẩm</span> 
    <select name="" id="option" onchange="handleChange()">
        
    </select> <br>
    <span>Gía</span> <input type="text" id="price"> <br>
    <span>Số lượng</span> <input type="number" id="stock"> <br>
    <button onclick="addProduct()" id="addbtn">Thêm sản phẩm</button>
    <input type="text" oninput="search()" placeholder="Tìm kiếm sản phẩm" id="search"><button>tìm kiếm</button>
    <h2>Danh sách sản phẩm</h2>
    <table border="1">
        <tr> 
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>Ảnh</th>
            <th>Gía <button onclick="tangdan()">tăng</button><button onclick="giamdan()">giảm</button></th>
            <th>Số lượng</th>
            <th>Thao tác</th>
        </tr>
        <tbody id="list">
          
        </tbody>
    </table>
    <script src="../js/product.js"></script>
</body>
</html>
