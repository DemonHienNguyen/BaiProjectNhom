<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <h2>Đăng nhập</h2>

    <div class="box">
        <label>Email</label>
        <input type="text" id="email" placeholder="Địa chỉ email">
        <p class="error" id="emailError">Email không hợp lệ</p>

        <label>Mật khẩu</label>
        <input type="password" id="password" placeholder="Mật khẩu">
        <p class="error" id="passwordError">Mật khẩu không đúng</p>

        <button id="login-btn" onclick="login()">Đăng nhập</button>

        <div class="signup">
            Chưa có tài khoản? <a href="./register.html">Đăng ký</a>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>

</html>
