<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <h2>Đăng ký</h2>

    <div class="box">
        <input type="text" id="fullname" placeholder="Họ và tên">
        <p class="error" id="fullnameError">* Họ và tên không được để trống</p>

        <input type="email" id="email" placeholder="Địa chỉ email">
        <p class="error" id="emailError">* Email không hợp lệ</p>

        <input type="password" id="password" placeholder="Mật khẩu">
        <p class="error" id="passwordError">* Mật khẩu phải có ít nhất 6 ký tự</p>

        <input type="password" id="confirmPassword" placeholder="Xác nhận Mật khẩu">
        <p class="error" id="confirmPasswordError">* Mật khẩu xác nhận không khớp</p>

        <button onclick="register()">Đăng ký</button>

        <div class="login">
            Đã có tài khoản? <a href="./login.html">Đăng nhập</a>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>

</html>
