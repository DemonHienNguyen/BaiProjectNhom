<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <h2>Đăng ký</h2>

    <div class="box">
        <input type="text" id="username" placeholder="Họ và tên">
        <p class="error error-name"></p>

        <input type="email" id="email" placeholder="Địa chỉ email">
        <p class="error error-email"></p>

        <input type="password" id="password" placeholder="Mật khẩu">
        <p class="error error-password"></p>

        <input type="password" id="confirmPassword" placeholder="Xác nhận Mật khẩu">
        <p class="error error-confirmPassword"></p>

        <button onclick="register(event)">Đăng ký</button>

        <div class="login">
            Đã có tài khoản? <a href="./login.html">Đăng nhập</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../js/register.js"></script>
    
</body>

</html>
